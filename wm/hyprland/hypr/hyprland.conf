# ┌───── Monitors ─────┐
monitor = ,preferred,auto,1          # works everywhere

# ┌───── Input ─────┐
input {
    kb_layout = us
    follow_mouse = 1                 # 1 = yes, 0 = no (cursor follows focus)
    sensitivity = 0                  # -1.0 – 1.0, 0 = default

    touchpad {
        natural_scroll = false       # fixed: "no" → false
        tap-to-click = true          # recommended
    }
}

# ┌───── General ─────┐
general {
    gaps_in = 5
    gaps_out = 15                    # 20 is huge on most screens; 15 is the sweet spot
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle                 # default anyway, but explicit is fine
    allow_tearing = false            # explicit (default)
}

# ┌───── Decoration ─────┐
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 8                     # 3 → 8 looks way better and is still cheap
        passes = 2                   # 1 → 2 for proper blur
        noise = 0.03
        contrast = 1.3
    }
}

# ┌───── Animations ─────┐
animations {
    enabled = true

    bezier = myBezier, 0.4, 0.0, 0.2, 1.0        # much smoother than the old overshoot one
    bezier = ease, 0.4, 0.0, 0.2, 1.0

    animation = windows,     1, 7, myBezier, popin 80%
    animation = windowsOut,  1, 5, ease,      popin 80%
    animation = border,      1, 8, ease
    animation = fade,        1, 6, ease
    animation = workspaces,  1, 6, ease, slide
}

# ┌───── Layouts ─────┐
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2                    # 0 = never, 1 = only when >1 window, 2 = always
}

master {
    new_status = master                # fixed: new_is_master → new_status (2025 syntax)
    orientation = left
}

# ┌───── Variables ─────┐
$mainMod = SUPER

# ┌───── Keybinds ─────┐
# Launcher
bind = $mainMod, Space, exec, wofi --show drun -i
bind = $mainMod, Return, exec, alacritty
bind = Ctrl Alt, T, exec, alacritty

# Basics
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 0          # real fullscreen (not “maximize”)
bind = $mainMod, V, togglefloating
bind = $mainMod, J, togglesplit
bind = $mainMod, T, togglegroup

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move window
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize (hold Super+Ctrl and mouse or use arrows)
bind = $mainMod CTRL, left,  resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive,  50 0
bind = $mainMod CTRL, up,    resizeactive,   0 -50
bind = $mainMod CTRL, down,  resizeactive,   0  50

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

bind = $mainMod, P, pseudo               # dwindle pseudo-tiling
bind = ALT, Tab, cyclenext           # Alt+Tab style 
bind = $mainMod, D, exec, wofi --show drun   

# screenshots 
$shiftMod = Super SHIFT
bind =          , Print, exec, hyprshot -zm region 
bind = $mainMod , Print, exec, hyprshot -zm window
bind = $shiftMod, Print, exec, hyprshot -zm output

bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, Q, exit

# ┌───── Startup ─────┐
exec-once = hyprpaper
exec-once = mako      

# Optional niceties 
exec-once = wl-paste --watch cliphist store          # clipboard manager
exec-once = nm-applet --indicator                    # network tray
exec-once = blueman-applet                           # bluetooth tray

# ┌───── Misc ─────┐
misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = true
}

# ┌───── Window Rules (examples) ─────┐
windowrulev2 = float,class:^(wofi)$
windowrulev2 = size 800 600,class:^(wofi)$
windowrulev2 = center,class:^(wofi)$


# overrides 
$waybar_conf = ~/.config/waybar/config.hyprland.jsonc
$waybar_css = ~/.config/waybar/style.css
exec = pkill waybar; waybar --style $waybar_css --config $waybar_conf 2>&1 | tee ~/.cache/waybar.log 

group {
    groupbar {
        enabled = true 
        # Solid dark background (Dracula bg) – no gradient nonsense
        col.active   = 0xff282a36
        col.inactive = 0xff282a36

        col.locked_active   = 0xff282a36
        col.locked_inactive = 0xff282a36

        # Light text for all states
        text_color                   = rgb(f8f8f2)   # normal
        text_color_inactive          = rgb(f8f8f2)   # same when out of focus
        text_color_locked_active     = rgb(f8f8f2)   # locked group active window
        text_color_locked_inactive   = rgb(f8f8f2)   # locked group inactive windows

        # Optional – clean look (most ricers use these)
        gradient_rounding = 0               # no gradient = no rounding needed
        round_only_edges = false
        render_titles = true
    }
}
