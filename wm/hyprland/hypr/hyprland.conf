# Monitor (auto-detect)
monitor=,preferred,auto,1

# Input
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0
}

# General
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# Animations
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Dwindle Layout (Automatic Tiling)
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# Master Layout (Fallback)
master {
    new_is_master = true
    orientation = left
}

# Keybinds
$mainMod = SUPER

# Launcher on Super tap
bind = , $mainMod, exec, wofi --show drun

# Terminal
bind = CTRL ALT, T, exec, alacritty
bind = $mainMod, Return, exec, alacritty  # Alternative: Super+Enter

# Kill active window
bind = $mainMod, Q, killactive

# Exit Hyprland
bind = $mainMod SHIFT, E, exit

# Toggle fullscreen
bind = $mainMod, F, fullscreen

# Toggle floating
bind = $mainMod, V, togglefloating

# Move focus (Vim-like)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize active window
bind = $mainMod CTRL, left, resizeactive, -10 0
bind = $mainMod CTRL, right, resizeactive, 10 0
bind = $mainMod CTRL, up, resizeactive, 0 -10
bind = $mainMod CTRL, down, resizeactive, 0 10

# Move/Resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Toggle split (dwindle/master)
bind = $mainMod, J, togglesplit

# Pseudo-tile
bind = $mainMod, P, pseudo

# Overview (like Pop!_OS)
bind = $mainMod, D, exec, hycov

# Keybinds Cheatsheet
bind = $mainMod, H, exec, ~/.config/hypr/scripts/show-keybinds.sh

# Restart Hyprland
bind = $mainMod SHIFT, R, restart

# Exec on start
exec-once = waybar  # Assume waybar is installed for status bar
exec-once = hyprpaper  # For wallpaper, configure separately
