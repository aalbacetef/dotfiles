
## Model

## ensure it uses English given I have some LC_ vars for Spanish
chat-language: en

# I mainly use the gemini model 
model: 'gemini/gemini-2.0-flash'
architect: false

## History files 
#
#  I like them to be visible 
input-history-file: aider.input.history
chat-history-file: aider.chat.history.md
llm-history-file: aider.llm.history

restore-chat-history: true 

## Git 

git: true 
gitignore: false  
aiderignore: .aiderignore 

auto-commits: false # don't autocommit all the time

## Conventions 

read:
  - AGENTS.md

